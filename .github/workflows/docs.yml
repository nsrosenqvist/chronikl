name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  gollum:

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        if: github.event_name == 'push'
        uses: actions/checkout@v6

      - name: Sync to wiki
        if: github.event_name == 'push'
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: docs/
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify chronikl-web of wiki update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CHRONIKL_WEB_DISPATCH_TOKEN }}
          repository: nsrosenqvist/chronikl-web
          event-type: wiki-updated
