name: Sync docs to GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Sync to wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: docs/
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify chronikl-web of wiki update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CHRONIKL_WEB_DISPATCH_TOKEN }}
          repository: nsrosenqvist/chronikl-web
          event-type: wiki-updated
